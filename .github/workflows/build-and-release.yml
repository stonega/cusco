name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNOME build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            gjs \
            gir1.2-adw-1 \
            gir1.2-gtk-4.0 \
            gir1.2-gtksource-5 \
            gir1.2-secret-1 \
            gir1.2-soup-3.0 \
            libglib2.0-bin \
            libglib2.0-dev \
            libglib2.0-dev-bin \
            libgtk-4-bin \
            meson \
            ninja-build \
            xvfb

      - name: Run smoke checks and build
        run: scripts/check.sh

      - name: Package install tree
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME}"
          staging="$PWD/dist/cusco-${tag}"
          meson install -C builddir --destdir "$staging"
          tar -C "$PWD/dist" -czf "cusco-${tag}.tar.gz" "cusco-${tag}"

      - name: Upload release package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: cusco-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME"
